name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t domiciledb:ci .

      - name: Boot container and check health (non-root, migrations on boot)
        run: |
          docker run -d --name domiciledb -p 3000:3000 domiciledb:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/api/health; then
              echo "healthy" && exit 0
            fi
            sleep 2
          done
          echo "container did not become healthy" >&2
          docker logs domiciledb >&2
          exit 1

      - name: Tear down
        if: always()
        run: docker rm -f domiciledb || true
