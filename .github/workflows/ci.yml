name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: App (Next.js / TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Unit tests + coverage gate
        run: npm run test:coverage

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  integration:
    name: Integration (RustFS S3 round-trip)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # RustFS: an Apache-2.0, Rust, S3-compatible store (an OSS-friendly MinIO
      # alternative). Run as a step (not a service) so it can be env-configured.
      - name: Start RustFS (S3-compatible)
        run: |
          docker run -d --name rustfs -p 9000:9000 \
            -e RUSTFS_ACCESS_KEY=rustfsadmin \
            -e RUSTFS_SECRET_KEY=rustfsadmin \
            -e RUSTFS_VOLUMES=/data \
            -v rustfs-data:/data \
            rustfs/rustfs:latest

      - name: Wait for RustFS S3 endpoint
        run: |
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://127.0.0.1:9000/; then
              sleep 2 && exit 0
            fi
            sleep 2
          done
          echo "RustFS did not become ready" >&2
          docker logs rustfs >&2
          exit 1

      - name: Backup/restore round-trip
        run: npm run test:integration
        env:
          S3_ENDPOINT: http://127.0.0.1:9000
          S3_REGION: us-east-1
          S3_BUCKET: domiciledb-ci
          S3_ACCESS_KEY_ID: rustfsadmin
          S3_SECRET_ACCESS_KEY: rustfsadmin

      - name: Stop RustFS
        if: always()
        run: docker rm -f rustfs || true

  supply-chain:
    name: Supply chain
    uses: ./.github/workflows/supply-chain.yml
    secrets: inherit
