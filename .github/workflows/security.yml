name: Supply chain

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so newly-disclosed CVEs surface even without a push.
    - cron: "0 7 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Block PRs that introduce vulnerable or disallowed-license dependencies.
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # npm advisory audit of the resolved dependency tree.
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Audit (fail on high+)
        run: npm audit --audit-level=high --omit=dev

  # Static analysis (SAST) for JS/TS.
  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Analyze
        uses: github/codeql-action/analyze@v3

  # Build the production image and scan it; publish an SBOM.
  image-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t domiciledb:scan .

      - name: Trivy vulnerability scan (SARIF)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: domiciledb:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy results
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Fail on CRITICAL/HIGH (fixable)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: domiciledb:scan
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: domiciledb:scan
          format: spdx-json
          artifact-name: domiciledb-sbom.spdx.json
